<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
  name="viewport"
  content="
  width=device-width,
  initial-scale=1.0,
  maximum-scale=1.0,
  user-scalable=no
  ">

  <title>Dynasty Legends</title>

  <link
  rel="stylesheet"
  href="style.css">

</head>

<body>

<div id="rotateScreen">
  Rotate Phone To Landscape
</div>

<div id="gameUI">

  <div id="topBar">

    <div>
      ❤️
      <span id="health">
        100
      </span>
    </div>

    <div>
      ⚔️ Dynasty Legends
    </div>

    <div>
      👹
      <span id="kills">
        0
      </span>
    </div>

  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="controls">

    <div id="joystick">
      <div id="stick"></div>
    </div>

    <button id="attackBtn">
      ATTACK
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
