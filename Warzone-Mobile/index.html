<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
  name="viewport"
  content="
  width=device-width,
  initial-scale=1.0,
  maximum-scale=1.0,
  user-scalable=no
  ">

  <title>WARZONE MOBILE</title>

  <link
  rel="stylesheet"
  href="style.css">

</head>

<body>

<div id="rotateScreen">
  Rotate Phone To Landscape Mode
</div>

<div id="gameUI">

  <div id="topBar">

    <div>
      ❤️
      <span id="health">100</span>
    </div>

    <div>
      🔫 AK-47
    </div>

    <div>
      💥
      <span id="ammo">30</span>
    </div>

    <div>
      🏆
      <span id="score">0</span>
    </div>

  </div>

  <div id="crosshair"></div>

  <canvas id="gameCanvas"></canvas>

  <div id="controls">

    <div id="joystick">
      <div id="stick"></div>
    </div>

    <button id="fireBtn">
      FIRE
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
